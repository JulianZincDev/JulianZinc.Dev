server {
  listen 443 ssl;
  http2 on;

  server_name julianzinc.dev www.julianzinc.dev;

  ssl_certificate /etc/letsencrypt/live/julianzinc.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/julianzinc.dev/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;

  # React Router SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend proxy
  location /api/ {
    proxy_pass http://portfolio-backend:8000/api/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}